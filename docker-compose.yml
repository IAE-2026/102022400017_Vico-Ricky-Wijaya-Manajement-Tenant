version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenant-service-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - tenant-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-tenant_service}
      - DB_USERNAME=${DB_USERNAME:-tenant_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - IAE_API_KEY=${IAE_API_KEY:-102022400017}
      - L5_SWAGGER_GENERATE_ALWAYS=true
      - L5_SWAGGER_USE_ABSOLUTE_PATH=true
    entrypoint: ["/var/www/docker/entrypoint.sh"]

  webserver:
    image: nginx:alpine
    container_name: tenant-service-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tenant-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: tenant-service-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tenant_service}
      MYSQL_USER: ${DB_USERNAME:-tenant_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - tenant-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  tenant-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
